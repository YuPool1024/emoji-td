<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Emoji 塔防</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header id="hud" aria-label="游戏状态"></header>
    <main id="canvas-area">
      <canvas id="game" width="800" height="500" aria-label="战场"></canvas>
      <div id="onboarding"></div>
      <div id="popup" aria-label="操作浮层"></div>
    </main>
    <nav id="towerbar" aria-label="防御塔选择"></nav>
  </div>
  <div id="flash" role="status" aria-live="polite"></div>
  <div id="overlay" role="dialog" aria-modal="true"></div>
  <script src="js/audio.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/map.js"></script>
  <script src="js/towers.js"></script>
  <script src="js/enemies.js"></script>
  <script src="js/hero.js"></script>
  <script src="js/game.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/panels/toast.js"></script>
  <script src="js/panels/hud.js"></script>
  <script src="js/panels/menu.js"></script>
  <script src="js/panels/towerbar.js"></script>
  <script src="js/panels/end.js"></script>
  <script src="js/panels/popup.js"></script>
  <script src="js/panels/onboarding.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
